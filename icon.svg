<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d1040"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fdd835" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fdd835" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- 発光 -->
  <rect width="512" height="512" rx="110" fill="url(#glow)"/>

  <!-- くうっち (denki版) scale=3, translate(106,121) -->
  <g transform="translate(106,121) scale(3)">
    <!-- かみなり装飾 (top) -->
    <polygon points="52,-20 44,0 53,-3 45,14" fill="#ffd600" stroke="#ff8f00" stroke-width="1.5"/>
    <circle cx="28" cy="-5" r="2.5" fill="#fff176"/>
    <circle cx="72" cy="-5" r="2.5" fill="#fff176"/>
    <line x1="20" y1="-8" x2="30" y2="0" stroke="#ffd600" stroke-width="2.5"/>
    <line x1="80" y1="-8" x2="70" y2="0" stroke="#ffd600" stroke-width="2.5"/>

    <!-- 体 (楕円) -->
    <ellipse cx="50" cy="48" rx="46" ry="32" fill="#fdd835" stroke="#f9a825" stroke-width="2.5"/>
    <!-- 口の中（暗い部分） -->
    <ellipse cx="50" cy="53" rx="40" ry="22" fill="#0d1117"/>
    <!-- 上の歯 -->
    <polygon points="10,37 17,55 24,37 31,55 38,37 45,55 52,37 59,55 66,37 73,55 80,37 87,55 91,37" fill="ivory"/>
    <!-- 下の歯 -->
    <polygon points="13,68 20,51 27,68 34,51 41,68 48,51 55,68 62,51 69,68 76,51 83,68 88,68" fill="ivory"/>
    <!-- 体の輪郭 -->
    <ellipse cx="50" cy="48" rx="46" ry="32" fill="none" stroke="#f9a825" stroke-width="2.5"/>
  </g>
</svg>
